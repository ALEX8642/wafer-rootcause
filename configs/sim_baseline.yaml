# sim_baseline.yaml — default simulation: 40 lots × 25 wafers = 1,000 wafers.
#
# Sizing is bound by the wafer-mixed TEST-split map inventory (Phase 1
# samples matching maps without replacement): the binding constraint is the
# 200 Normal maps, not the 7,603 total — so the sim is deliberately
# defect-dense (~85 % of wafers carry at least one label). That is also the
# conservative setting for attribution: a high common baseline makes the
# planted excursions harder to isolate, not easier.
#
# Deterministic per seed. All times are relative to sim_start.

seed: 42
sim_start: "2026-06-01 00:00:00"
product: PRD-A
n_lots: 40
wafers_per_lot: 25
lot_interarrival_hours: 4.0    # ~160 h horizon
wafer_stagger_minutes: 2.0
queue_mean_minutes: 10.0
inspect_delay_minutes: 30.0
dispatch: random               # uniform chamber choice (Phase 3 adds correlated)
db_path: outputs/wafer_rootcause.duckdb

# 6-step route; chamber_id convention: <STEP>-T<tool>-C<chamber>
route:
  - {name: OXIDATION,  process_type: furnace,     tools: 2, chambers_per_tool: 2, process_minutes: 50}
  - {name: LITHO,      process_type: lithography, tools: 3, chambers_per_tool: 1, process_minutes: 30}
  - {name: ETCH,       process_type: dry_etch,    tools: 2, chambers_per_tool: 3, process_minutes: 40}
  - {name: DEPOSITION, process_type: cvd,         tools: 2, chambers_per_tool: 2, process_minutes: 45}
  - {name: IMPLANT,    process_type: ion_implant, tools: 2, chambers_per_tool: 1, process_minutes: 25}
  - {name: CMP,        process_type: cmp,         tools: 2, chambers_per_tool: 2, process_minutes: 35}

# Everywhere-contamination (see BaselineRates docstring for semantics).
baseline:
  center_donut: 0.38
  edge: 0.38
  loc: 0.32
  scratch: 0.32
  near_full: 0.02      # clean wafers only; test-split inventory is 30 maps
  random_pattern: 0.05 # clean wafers only

# Planted excursions — the ground truth Phase 2 has to recover.
# Mixed intensities on purpose: F4 is deliberately weak (honest misses).
faults:
  - {fault_id: F1, chamber: ETCH-T1-C2,       label: Edge-Ring, start_hour: 24,  duration_hours: 48, p_acquire: 0.70}
  - {fault_id: F2, chamber: DEPOSITION-T2-C1, label: Center,    start_hour: 60,  duration_hours: 50, p_acquire: 0.50}
  - {fault_id: F3, chamber: CMP-T1-C2,        label: Scratch,   start_hour: 10,  duration_hours: 40, p_acquire: 0.50}
  - {fault_id: F4, chamber: OXIDATION-T2-C1,  label: Donut,     start_hour: 90,  duration_hours: 40, p_acquire: 0.25}
  - {fault_id: F5, chamber: ETCH-T2-C3,       label: Edge-Loc,  start_hour: 95,  duration_hours: 40, p_acquire: 0.60}
